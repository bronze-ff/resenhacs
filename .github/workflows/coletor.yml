name: Coletor

on:
  schedule:
    - cron: '17 * * * *' # de hora em hora (minuto 17 para evitar o pico do topo da hora)
  workflow_dispatch: {}

# Evita duas rodadas simultâneas (a conta-bot só pode ter UMA sessão de CS2 por vez —
# a Steam derruba a segunda com LoggedInElsewhere).
concurrency:
  group: coletor
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar psycopg
        run: pip install "psycopg[binary]>=3.2"
      - name: Descobrir Partidas novas (corrente de share codes)
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python -m coletor.main discover

  fetch:
    # Baixa e ingere as pendentes: bot (GC) resolve o link do .dem, o Coletor baixa,
    # parseia e sobe stats + replay + demo pro R2/banco.
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências do Coletor
        working-directory: coletor
        run: pip install -r requirements.txt
      - name: Instalar dependências do bot
        working-directory: bot
        run: npm ci
      - name: Baixar e ingerir Partidas pendentes
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_BOT_USER: ${{ secrets.STEAM_BOT_USER }}
          STEAM_BOT_PASS: ${{ secrets.STEAM_BOT_PASS }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main fetch --since 2026-07-08

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Testes do Coletor
        working-directory: coletor
        run: |
          pip install -r dev-requirements.txt
          python -m pytest -q
