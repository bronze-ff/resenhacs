name: Coletor

on:
  schedule:
    - cron: '*/10 * * * *' # de 10 em 10 min. Repo é PUBLIC desde 2026-07-21 (minutos
                        # ilimitados no GitHub Actions) — sem custo de minuto, o teto real
                        # é a duração da própria run: histórico real (gh run list,
                        # 2026-07-21) mostra runs ociosas (sem Partida nova) em <1min e
                        # runs processando demo em ~6-6.5min. 10 min dá folga mesmo na run
                        # mais lenta observada, sem empilhar (concurrency abaixo serializa,
                        # não roda 2 ao mesmo tempo — a conta-bot só aguenta 1 sessão CS2).
                        # 5 min é o piso prático documentado pelo GitHub pra scheduled
                        # workflows; abaixo disso o agendamento pode ser ignorado/atrasado.
  workflow_dispatch:
    inputs:
      reprocessar_tudo:
        description: 'Reprocessar todas as Partidas com demo ainda no R2 (bug de parser corrigido)'
        type: boolean
        default: false
      reprocessar_desde:
        description: 'Reprocessar só Partidas jogadas a partir dessa data (YYYY-MM-DD) — mais rápido que reprocessar tudo'
        type: string
        default: ''
      configurar_cors:
        description: 'Configurar CORS no bucket R2 (upload de demo pro via navegador) - rodar uma vez'
        type: boolean
        default: false
      buscar_avatares:
        description: 'Backfill: buscar avatar Steam de todos os jogadores já vistos em alguma Partida (inclusive fora do grupo)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ['coletor/**', 'bot/**', '.github/workflows/coletor.yml']

# Escopo mínimo do GITHUB_TOKEN (o default do GitHub é read/write em quase tudo) — este
# workflow só faz checkout, não precisa escrever em conteúdo/PR/issues/etc.
permissions:
  contents: read

# Evita duas rodadas simultâneas (a conta-bot só pode ter UMA sessão de CS2 por vez —
# a Steam derruba a segunda com LoggedInElsewhere).
concurrency:
  group: coletor
  cancel-in-progress: false

jobs:
  # discover + fetch num job SÓ (não dois): a Actions fatura por job, arredondando pra
  # cima pro minuto cheio — dois jobs custam no mínimo 2 min faturados por execução
  # mesmo rodando 20s cada; um job só custa 1. Como isso roda de 30 em 30 min o dia
  # inteiro, esse é o maior fator de custo — vale mais que qualquer outra otimização.
  sincroniza:
    runs-on: ubuntu-latest
    # Reprocessar TODAS as Partidas (run manual) não cabe em 45 min — o timeout
    # curto derrubou o run 29278267027 no meio. 300 min só nesse caso; o job
    # agendado normal continua com 45 pra não segurar a fila meia hora à toa.
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && inputs.reprocessar_tudo && 300 || 45 }}
    steps:
      # Actions pinadas por SHA de commit (não por tag mutável) — uma tag como @v4 pode
      # ser movida pelo publisher (de boa-fé ou por conta comprometida) pra apontar pra
      # outro código sem o repo perceber; o SHA é imutável.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: coletor/requirements.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json
      - name: Instalar unar (extração de .rar)
        run: sudo apt-get update && sudo apt-get install -y unar
      - name: Instalar dependências do Coletor
        working-directory: coletor
        run: pip install -r requirements.txt
      - name: Auditoria de dependências do Coletor (pip-audit, somente relatório)
        # Só reporta por enquanto (continue-on-error) — não quebra o pipeline existente
        # sem aviso prévio. Quando o relatório estiver limpo/triado, trocar por gate real.
        working-directory: coletor
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
      - name: Instalar dependências do bot
        working-directory: bot
        run: npm ci
      - name: Auditoria de dependências do bot (npm audit, somente relatório)
        # bot/ tinha vulnerabilidade conhecida (adm-zip < 0.6.0, transitiva via
        # steam-user->globaloffensive, GHSA-xcpc-8h2w-3j85) sem fix compatível ainda
        # publicado pelo steam-user — continue-on-error pra não travar o pipeline
        # enquanto isso, mas com o relatório visível a cada run pra notar quando
        # sair um steam-user novo que resolva.
        working-directory: bot
        continue-on-error: true
        run: npm audit
      - name: Descobrir Partidas novas (corrente de share codes)
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python -m coletor.main discover
      - name: Baixar e ingerir Partidas pendentes
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_BOT_USER: ${{ secrets.STEAM_BOT_USER }}
          STEAM_BOT_PASS: ${{ secrets.STEAM_BOT_PASS }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: python -m coletor.main fetch
      # Apaga só o .dem BRUTO (mantém replay.json pra sempre) de Partidas processadas há
      # 90+ dias — decisão do usuário: reduz custo de armazenamento no R2 sem travar
      # reprocessamento de bug de parser achado logo depois de uma Partida ser jogada
      # (janela de 90 dias cobre isso; casos mais raros/antigos perdem essa flexibilidade).
      - name: Limpar demos antigas do R2 (90+ dias)
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main cleanup
      - name: Processar fila de partidas profissionais (HLTV)
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main processar-fila-pro
      - name: Processar uploads manuais de demo pendentes
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main processar-uploads-pendentes
      - name: Sincronizar partidas FACEIT (membros vinculados)
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main sincronizar-faceit
      # Só roda quando disparado manualmente com o input marcado — reprocessa TODAS as
      # Partidas com demo ainda no R2 (janela de 90 dias) com o parser ATUAL, pra corrigir
      # stats já gravadas depois de um bug de parser ser corrigido (ex.: kill de USP-S
      # virando P2000 nas stats — corrigido no commit 497e3bd, precisa reprocessar as
      # Partidas já ingeridas antes do fix pra atualizar o que já está gravado).
      - name: Reprocessar Partidas (sob demanda, tudo ou --since)
        if: github.event_name == 'workflow_dispatch' && (inputs.reprocessar_tudo == true || inputs.reprocessar_desde != '')
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Input de workflow_dispatch passado via env, nunca ${{ }} direto num bloco
          # run — interpolação direta do input no bash vira injeção de comando
          # (CWE-78): alguém digitando `$(rm -rf .)` no campo do dispatch executaria
          # isso como shell. Como env var, o valor só existe como dado.
          REPROCESSAR_DESDE: ${{ inputs.reprocessar_desde }}
        run: |
          if [ -n "$REPROCESSAR_DESDE" ]; then
            if ! [[ "$REPROCESSAR_DESDE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::reprocessar_desde inválido: '$REPROCESSAR_DESDE' (esperado YYYY-MM-DD)"
              exit 1
            fi
            python -m coletor.main reprocess --since "$REPROCESSAR_DESDE"
          else
            python -m coletor.main reprocess
          fi
      - name: Configurar CORS no bucket R2 (sob demanda)
        if: github.event_name == 'workflow_dispatch' && inputs.configurar_cors == true
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m coletor.main configurar-cors
      - name: Buscar avatares Steam (backfill, sob demanda)
        if: github.event_name == 'workflow_dispatch' && inputs.buscar_avatares == true
        working-directory: coletor
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python -m coletor.main avatares

  # Só em push/manual — rodar isso a cada 30 min sem mudança de código é dinheiro
  # (minutos) jogado fora, e é a maior fatia do orçamento se ficasse no agendamento.
  tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: coletor/dev-requirements.txt
      - name: Testes do Coletor
        working-directory: coletor
        run: |
          pip install -r dev-requirements.txt
          python -m pytest -q
